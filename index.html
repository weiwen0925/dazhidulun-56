<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
  --primary:#2C1810;--primary-light:#5B3A29;--shadow:rgba(91,58,41,.08);
}
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;-webkit-user-drag:none;}
html,body{
  scrollbar-width:none;-ms-overflow-style:none;
  background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  line-height:1.8;font-size:17px;
  scroll-behavior:smooth;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
img{-webkit-user-drag:none;pointer-events:none;}

/* Sidebar */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:10px;width:100%;align-items:center;padding:6px 0;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:5px 4px;width:64px;text-decoration:none;color:var(--sbText);
  border-radius:8px;transition:all .25s;cursor:pointer;}
.sb-item:hover{background:rgba(184,134,11,.12);color:var(--goldL);}
.sb-item.active{background:rgba(184,134,11,.22);color:var(--goldL);
  box-shadow:inset 0 0 0 1px rgba(184,134,11,.4),0 0 16px rgba(184,134,11,.18);}
.sb-circle{display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;
  background:rgba(212,196,168,.15);border:1px solid rgba(212,196,168,.3);
  color:var(--gold);font-family:"Noto Sans TC",sans-serif;font-weight:600;font-size:15px;
  transition:all .25s;}
.sb-item:hover .sb-circle{background:rgba(184,134,11,.25);border-color:var(--gold);}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;letter-spacing:.5px;
  text-align:center;line-height:1.25;writing-mode:horizontal-tb;}

/* Hamburger */
#sbToggle{display:none;position:fixed;left:14px;top:14px;z-index:200;
  width:44px;height:44px;border-radius:50%;background:var(--sbBg);
  color:var(--gold);border:1px solid var(--gold);font-size:20px;cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.25);}

/* Main */
.main{margin-left:var(--sbW);padding:0;}

/* Hero */
.site-hero{
  background:linear-gradient(135deg,#1e1a14 0%,#2a2218 30%,#3d3225 60%,#2a2218 100%);
  color:#f5e6c8;padding:80px 30px 70px;text-align:center;position:relative;overflow:hidden;
}
.site-hero::before{
  content:"般若";position:absolute;font-size:380px;font-weight:900;
  color:rgba(212,168,75,.04);left:50%;top:50%;transform:translate(-50%,-50%);
  font-family:"Noto Serif TC",serif;pointer-events:none;
}
.hero-content{position:relative;z-index:2;max-width:980px;margin:0 auto;}
.hero-eyebrow{font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:6px;
  color:var(--goldL);opacity:.7;margin-bottom:20px;}
.hero-title{font-size:46px;font-weight:900;color:#fff;margin-bottom:18px;letter-spacing:6px;}
.hero-subtitle{font-size:17px;color:var(--goldL);margin-bottom:10px;letter-spacing:3px;font-weight:600;}
.hero-sub{font-size:15px;color:#e8d5a8;margin-bottom:22px;line-height:1.8;}
.hero-meta{font-size:13px;color:rgba(245,230,200,.55);margin-bottom:8px;letter-spacing:1px;}
.hero-range{font-size:13.5px;color:var(--goldL);margin:6px 0 14px;letter-spacing:1.5px;}
.hero-tag{font-family:"Noto Sans TC",sans-serif;font-size:10.5px;letter-spacing:3px;
  color:rgba(212,168,75,.55);text-transform:uppercase;}

/* Preface */
.preface{
  max-width:880px;margin:48px auto 0;padding:0 24px;
}
.preface-title{font-size:24px;text-align:center;color:var(--accent);
  letter-spacing:6px;font-weight:600;padding:12px 0;margin-bottom:18px;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.preface p{
  color:var(--text2);font-size:16px;line-height:2;margin:0 0 16px;text-align:justify;
  text-indent:2em;
}

/* TOC */
.toc-section{max-width:1100px;margin:54px auto 30px;padding:0 24px;}
.toc-title{font-size:28px;text-align:center;color:var(--accent);
  letter-spacing:8px;font-weight:600;margin-bottom:6px;}
.toc-desc{font-size:14px;text-align:center;color:var(--text-muted);margin-bottom:30px;letter-spacing:2px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.toc-card{
  display:flex;flex-direction:column;text-decoration:none;
  background:var(--card);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:10px;
  padding:18px 22px;transition:all .25s;
  box-shadow:0 1px 3px rgba(91,58,41,.06);
}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,58,41,.18);
  border-left-color:var(--goldL);}
.toc-num{
  display:inline-block;width:30px;height:30px;border-radius:50%;
  background:var(--gold);color:#fff;
  font-family:"Noto Sans TC",sans-serif;font-weight:700;font-size:15px;
  text-align:center;line-height:30px;margin-bottom:10px;
}
.toc-name{font-size:16.5px;font-weight:600;color:var(--accent);margin-bottom:6px;letter-spacing:1px;line-height:1.6;}
.toc-desc-card{display:block;font-size:13px;color:var(--text-muted);}
.toc-card .toc-desc{font-size:13.5px;color:var(--text-muted);margin:0;letter-spacing:1px;text-align:left;}

/* Chapter section */
.chapter{margin:50px 0 0;padding:0;scroll-margin-top:20px;}
.ch-head{
  background:var(--headGrad);color:#fff;padding:42px 30px;text-align:center;
  position:relative;
}
.ch-head::after{
  content:"";position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
  width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:6px;color:var(--goldL);margin-bottom:14px;}
.ch-name{font-size:30px;font-weight:700;color:#fff;letter-spacing:3px;margin:6px 0 10px;}
.ch-sub{font-size:14.5px;color:#e8d5a8;letter-spacing:2px;}
.ch-body{
  max-width:1080px;margin:0 auto;padding:34px 24px 24px;
  background:transparent;
}

/* Bridge */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);
  border-left:5px solid var(--gold);
  border-radius:10px;
  padding:18px 26px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;
}
.bridge-label{
  display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;
  background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;
  letter-spacing:2px;margin-bottom:10px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;text-align:justify;}

/* iframe */
.ch-frame{
  display:block;width:100%;border:0;
  background:#fffdf7;
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;
  min-height:180px;
}

/* next-link */
.next-link{
  display:block;text-align:center;
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;color:var(--accent);
  padding:14px 24px;margin:24px auto 0;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:30px;max-width:520px;
  text-decoration:none;letter-spacing:2px;
  transition:all .25s;
}
.next-link:hover{background:var(--gold);color:#fff;border-color:var(--gold);}

/* Footer */
.site-footer{
  background:linear-gradient(135deg,#2a2218,#1e1a14);
  color:rgba(245,230,200,.65);
  padding:50px 24px 38px;text-align:center;margin-top:60px;
}
.site-footer p{margin:6px 0;font-size:14px;letter-spacing:2px;line-height:1.9;}
.site-footer p:first-child{color:var(--goldL);font-size:15px;letter-spacing:5px;}

/* Read progress capsule */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;
}
.read-progress.hide-near-end{
  opacity:0;
  transform:translateX(-50%) translateY(28px);
}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* Back to top */
#backTop{position:fixed;right:24px;bottom:30px;z-index:120;
  display:none;width:44px;height:44px;border-radius:50%;
  background:var(--gold);color:#fff;border:0;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.25);font-size:18px;font-weight:700;}
#backTop.show{display:block;}

/* Responsive */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .hero-title{font-size:34px;letter-spacing:3px;}
  .ch-name{font-size:24px;}
  .ch-head{padding:30px 18px;}
  .ch-body{padding:24px 14px 18px;}
  .toc-grid{grid-template-columns:1fr;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:28px;}
  .preface p{font-size:15px;}
}

/* ============ 1.2x 字級放大（buddhist-text-html 新卷預設）============ */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-sub,.site-hero .hero-sub,.hero-meta{font-size:18px!important;}
.hero-range{font-size:17px!important;}
.preface p,.preface-text p{font-size:19px!important;line-height:2.1!important;}
.preface h2,.preface-title{font-size:30px!important;}
.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.toc-num{font-size:17px!important;}
.toc-card .toc-desc{font-size:16px!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub,.ch-desc,.ch-subtitle{font-size:17px!important;}
.next-link{font-size:17px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
.read-progress .rp-bar{width:148px!important;height:4px!important;}
.read-progress .rp-pct{font-size:13px!important;}
.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:15px!important;}
.sb-label{font-size:11.5px!important;}
.site-footer,.site-footer p{font-size:15px!important;}
@media (max-width:600px){
  body{font-size:17px!important;}
  .hero-title,.site-hero h1{font-size:38px!important;}
  .ch-name{font-size:26px!important;}
}

<button id="backTop" title="回到頂部">↑</button>
<script>
/* ===== Sticky brand → top ===== */
(function(){
  var sbBrand=document.getElementById('sbBrand');
  if(sbBrand){
    sbBrand.addEventListener('click',function(e){
      e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});
    });
  }
})();

/* ===== Hamburger ===== */
(function(){
  var t=document.getElementById('sbToggle'),sb=document.getElementById('sb');
  if(t&&sb){t.addEventListener('click',function(){sb.classList.toggle('open');});}
})();

/* ===== Back to top ===== */
(function(){
  var bt=document.getElementById('backTop');
  window.addEventListener('scroll',function(){
    if(window.scrollY>600) bt.classList.add('show');
    else bt.classList.remove('show');
  });
  bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
})();

/* ===== Sidebar active highlight ===== */
function updateActiveSidebar(){
  var chapters=document.querySelectorAll('section.chapter');
  var threshold=window.innerHeight*0.35;
  var activeId=null;
  chapters.forEach(function(c){
    var top=c.getBoundingClientRect().top;
    if(top<threshold) activeId=c.id;
  });
  document.querySelectorAll('.sb-item').forEach(function(a){
    var href=a.getAttribute('href')||'';
    if(href==='#'+activeId) a.classList.add('active');
    else a.classList.remove('active');
  });
}

/* ===== iframe auto-height (no buffer, no documentElement) ===== */
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body) return;
    d.body.style.minHeight='0';
    d.body.style.height='auto';
    if(d.documentElement){
      d.documentElement.style.minHeight='0';
      d.documentElement.style.height='auto';
    }
    var h=d.body.scrollHeight;
    if(h>100){
      f.style.height=h+'px';
      f.style.minHeight='0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries<30) setTimeout(tick,200);
  }
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){
    tick();
  }else{
    f.addEventListener('load',tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);

var rzT;
window.addEventListener('resize',function(){
  clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);
});

/* ===== Anchor click: resize first then scroll ===== */
document.addEventListener('click',function(e){
  var a=e.target;
  while(a&&a.tagName!=='A') a=a.parentElement;
  if(!a) return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2) return;
  var id=h.substring(1);
  var el=document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});
  },60);
},true);

/* ===== Progress capsule ===== */
var rpFill=document.getElementById('rpFill');
var rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill) rpFill.style.width=pct+'%';
  if(rpPct)  rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',function(){updateProgress();updateActiveSidebar();},{passive:true});
updateProgress();updateActiveSidebar();

/* ===== Hide capsule near footer ===== */
(function(){
  var cap=document.getElementById('readProgress');
  if(!cap) return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];
  var f1=document.querySelector('.site-footer');
  if(f1) targets.push(f1);
  if(!targets.length) return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  }else{
    var check=function(){
      var dh=document.documentElement.scrollHeight;
      var sb=window.scrollY+window.innerHeight;
      setHide(dh-sb<240);
    };
    window.addEventListener('scroll',check,{passive:true});check();
  }
})();

/* ===== Periodic resize 15s ===== */
var _rt=0,_riv=setInterval(function(){
  _rt++;resizeAllFrames();
  if(_rt>50) clearInterval(_riv);
},300);

/* ===== Anti-copy outer ===== */
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-56-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
