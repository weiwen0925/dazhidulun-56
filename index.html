<style>

/* ─────────────────────  Sidebar  ───────────────────── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;

  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}

.sb-brand{position:sticky;top:0;width:100%;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;

.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:5px 4px;width:64px;text-decoration:none;color:var(--sbText);
  border-radius:8px;transition:all .25s;cursor:pointer;}
.sb-item:hover{background:rgba(184,134,11,.12);color:var(--goldL);}
.sb-item.active{background:rgba(184,134,11,.22);color:var(--goldL);
  box-shadow:inset 0 0 0 1px rgba(184,134,11,.4),0 0 16px rgba(184,134,11,.18);}
.sb-circle{display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;

  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:20px 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;}
.bridge-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:12.5px;background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 8px;color:var(--text2);line-height:2.1;font-size:18.5px;text-indent:0;}
.bridge p:last-child{margin-bottom:0;}

/* ─────────────────────  Classical text (經文原典)  ───────────────────── */
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;
  border-radius:10px;padding:24px 28px;line-height:2.0;margin:18px 0;
  position:relative;font-size:20px;}
.classical-text p{margin-bottom:14px;line-height:2.0;text-indent:2em;}
.classical-text p:last-child{margin-bottom:0;}
.text-label{display:inline-block;background:var(--primary);color:#fff;
  padding:4px 14px;border-radius:14px;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13.5px;letter-spacing:2px;margin-bottom:14px;}

/* ─────────────────────  Verse / Quote (偈頌引文)  ───────────────────── */
.verse,.gatha,blockquote{
  background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:14px 22px;line-height:2.2;text-align:center;
  margin:16px 0;font-size:22px;white-space:normal;}

/* ─────────────────────  Card / Insight  ───────────────────── */
.card,.insight,.commentary,.note{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:18px 24px;margin:16px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.08);}
.card-title,.insight-title{font-size:21.5px;font-weight:600;
  color:var(--accent);margin-bottom:10px;letter-spacing:1px;}
.card-content,.insight-content,.commentary p{font-size:20px;line-height:1.9;color:var(--text2);}
.commentary{border-left:4px solid var(--accentL);background:#fefaf0;}
.commentary strong{color:var(--accent-red);}

/* ─────────────────────  Grid / Two-col  ───────────────────── */
.two-col,.three-col{display:grid;gap:16px;margin:18px 0;}
.two-col{grid-template-columns:1fr 1fr;}
.three-col{grid-template-columns:repeat(3,1fr);}
.col,.col-card{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:16px 20px;font-size:19px;line-height:1.9;}
.col-title{font-size:21.5px;font-weight:600;color:var(--accent);margin-bottom:8px;}

/* ─────────────────────  QA  ───────────────────── */
.qa{margin:18px 0;}
.qa .q{font-size:20px;line-height:1.9;padding:12px 18px;border-left:4px solid #4a6b8a;
  background:rgba(74,107,138,.08);color:#2c4a6b;border-radius:6px;margin-bottom:8px;}
.qa .a{font-size:20px;line-height:1.9;padding:12px 18px;color:var(--text);}

/* ─────────────────────  Flow (垂直流程)  ───────────────────── */
.flow.flow-v{display:flex;flex-direction:column;align-items:stretch;gap:8px;margin:18px 0;}
.flow-step{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:14px 20px;text-align:center;font-size:17.5px;line-height:1.7;}
.flow-step strong{color:var(--accent-red);}
.flow-step small{display:block;font-size:14.5px;color:var(--text-muted);margin-top:4px;}
.flow-arrow{text-align:center;color:var(--gold);font-size:20px;font-weight:700;}

/* ─────────────────────  Domino-chain  ───────────────────── */
.domino-chain{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:10px;margin:18px 0;}
.domino{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px 16px;font-size:17.5px;color:var(--accent);font-weight:600;}
.chain-arrow{color:var(--gold);font-weight:700;font-size:20px;}

/* ─────────────────────  Next-link  ───────────────────── */
.next-link{display:inline-block;margin:24px auto 0;padding:10px 26px;
  background:var(--accent);color:#fff;border-radius:24px;text-decoration:none;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:17px;letter-spacing:2px;
  transition:all .25s;}
.next-link:hover{background:var(--gold);transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(184,134,11,.3);}

/* ─────────────────────  Reading progress capsule  ───────────────────── */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:40px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}

/* ─────────────────────  Back-to-top  ───────────────────── */
#backTop{position:fixed;right:24px;bottom:24px;width:46px;height:46px;
  border-radius:50%;border:none;cursor:pointer;
  background:var(--accent);color:#fff;font-size:20px;font-weight:700;
  box-shadow:0 4px 14px rgba(91,58,41,.3);
  opacity:0;transition:all .3s;z-index:110;display:none;}
#backTop.show{display:block;opacity:1;}
#backTop:hover{background:var(--gold);transform:translateY(-3px);}

/* ─────────────────────  Footer  ───────────────────── */
.site-footer{background:var(--sbBg);color:var(--sbText);
  padding:36px 32px 32px;text-align:center;margin-top:60px;}
.site-footer p{font-size:15px;color:#a89578;line-height:1.9;margin-bottom:6px;}
.site-footer .gold{color:var(--gold);font-weight:600;letter-spacing:2px;}

/* ─────────────────────  Responsive  ───────────────────── */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.show{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .ch-body{padding:28px 20px;}
  .hero-title{font-size:40px;letter-spacing:4px;}
  .ch-name{font-size:28px;letter-spacing:3px;}
  .two-col,.three-col{grid-template-columns:1fr;}
  body{font-size:18px;}
}
@media(max-width:600px){
  body{font-size:17px;}
  .hero-title{font-size:34px;}
  h2{font-size:25px;}
  h3{font-size:21px;}
  p,.classical-text p{font-size:18px;}
  .verse{font-size:19px;}
}

/* preface */
.preface{max-width:880px;margin:48px auto 0;padding:0 28px;}

.toc-section{max-width:1100px;margin:60px auto 30px;padding:0 28px;}

.toc-card::before{content:&quot;&quot;;position:absolute;left:0;top:0;bottom:0;

.toc-num{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;

/* chapter */
.chapter{margin:60px 0 0;}
.ch-head{background:var(--headGrad);color:#f7f3ec;text-align:center;
  padding:42px 28px;position:relative;}
.ch-head::after{content:&quot;&quot;;position:absolute;left:50%;bottom:18px;

  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:5px;
  color:var(--goldL);margin-bottom:14px;opacity:.85;}
.ch-name{font-family:&quot;Noto Serif TC&quot;,serif;font-size:30px;font-weight:700;
  color:var(--goldL);margin:0 0 14px;letter-spacing:3px;line-height:1.4;}

/* bridge */
.bridge{

}

}

  padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

/* h2 */
.ch-body h2{font-family:&quot;Noto Serif TC&quot;,serif;font-size:24px;color:var(--accent);
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent);
  padding:10px 0 10px 20px;margin:32px 0 14px;letter-spacing:2px;line-height:1.5;font-weight:700;}
.ch-body h3{font-family:&quot;Noto Serif TC&quot;,serif;font-size:19px;color:var(--text);

.ch-body h4{font-size:17px;color:var(--text2);margin:18px 0 8px;font-weight:600;}
.ch-body h5{font-size:15.5px;color:var(--gold);margin:10px 0 8px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:600;letter-spacing:1.5px;}
.ch-body p{margin:0 0 12px;text-align:justify;}
.ch-body strong,.ch-body b{color:var(--accent-red);font-weight:700;}

/* commentary */
.commentary{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:16px 22px;margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.commentary p:last-child{margin-bottom:0;}

/* insight, metaphor, note */
.insight{background:linear-gradient(135deg,#fffaf0,#fff5e0);
  border:1px solid var(--gold);border-radius:8px;
  padding:16px 22px;margin:14px 0;box-shadow:0 1px 4px rgba(184,134,11,.1);}
.insight h5{margin-top:0;color:var(--accent);font-size:15px;

.metaphor{background:#fdf6e8;border-left:4px solid var(--accentL);

.metaphor h5{margin-top:0;color:var(--accent);font-size:15px;letter-spacing:1.5px;}

/* classical-text */
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:18px 24px;margin:16px 0;line-height:1.95;
  position:relative;box-shadow:0 1px 3px rgba(91,58,41,.05);}
.classical-text p{margin:0 0 10px;}
.classical-text p:last-child{margin-bottom:0;}
.text-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:11.5px;background:var(--accent);color:#fff;
  padding:3px 14px;border-radius:12px;letter-spacing:2.5px;margin-bottom:12px;}

/* qa */
.qa{margin:18px 0;}
.qa .q,.qa .a{padding:12px 18px;border-radius:8px;margin-bottom:10px;
  line-height:1.85;}
.qa .q{background:#eef3f8;border-left:4px solid #5b8ab5;color:#1d3a52;}
.qa .a{background:#faf5ec;border-left:4px solid var(--accent);color:var(--text);}
.qa .q::before{content:&quot;問　&quot;;font-weight:700;color:#1d3a52;letter-spacing:2px;}
.qa .a::before{content:&quot;答　&quot;;font-weight:700;color:var(--accent);letter-spacing:2px;}

/* grids */
.four-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:16px 0;}
.four-grid .cell{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:14px 18px;}
.cell-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;font-weight:700;
  color:var(--gold);letter-spacing:2px;margin-bottom:6px;}
.cell-term{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:6px;letter-spacing:1.5px;}
.cell-desc{font-size:14.5px;color:var(--text2);line-height:1.75;}

.grid-4{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:16px 0;}
.grid-4 .cell{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:14px 18px;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;}
.two-col .col{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:14px 18px;}
.col-title{font-size:15.5px;font-weight:700;color:var(--accent);
  border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:8px;letter-spacing:1px;}
.col-content{font-size:14.5px;line-height:1.85;color:var(--text);}

.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0;}
.three-col .col{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;}

/* debate */
.debate{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;}
.debate .q-side{background:#eef3f8;border:1px solid #c2d4e3;border-left:4px solid #5b8ab5;
  border-radius:8px;padding:14px 18px;}
.debate .a-side{background:#faf0e8;border:1px solid var(--border);border-left:4px solid var(--accent-red);
  border-radius:8px;padding:14px 18px;}
.debate h5{margin:0 0 8px;letter-spacing:2px;}
.debate .q-side h5{color:#1d3a52;}
.debate .a-side h5{color:var(--accent-red);}
.debate p{margin:0;font-size:15px;line-height:1.85;}

/* flow */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px;margin:16px 0;}
.flow.flow-v{flex-direction:column;align-items:stretch;}
.flow-step,.flow-box{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:12px 18px;min-width:180px;
  font-size:14.5px;line-height:1.7;text-align:center;
  box-shadow:0 1px 3px var(--shadow);}
.flow-step small,.flow-box small{display:block;color:var(--text-muted);font-size:13px;margin-top:4px;}
.flow-arrow{font-size:22px;color:var(--gold);font-weight:700;text-align:center;}
.flow.flow-v .flow-arrow{align-self:center;text-align:center;display:block;width:100%;line-height:1;margin:2px 0;}

/* spectrum */
.spectrum{display:flex;align-items:center;justify-content:space-between;
  gap:14px;margin:18px 0;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:16px 22px;}
.sp-node{font-size:14.5px;color:var(--text2);font-weight:600;letter-spacing:1.5px;}
.sp-mid{flex:1;text-align:center;background:linear-gradient(90deg,var(--gold),var(--goldL));
  color:#fff;border-radius:10px;padding:12px 18px;}
.sp-mid h5{margin:0;color:#fff;font-size:14.5px;letter-spacing:2px;}
.sp-mid small{color:rgba(255,255,255,.92);font-size:12px;display:block;margin-top:3px;}

/* roadmap */
.roadmap{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;margin:18px 0;}
.rm-step{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;text-align:center;}
.rm-icon{font-size:24px;color:var(--gold);font-weight:700;margin-bottom:6px;}
.rm-title{font-size:15.5px;font-weight:700;color:var(--accent);margin-bottom:4px;letter-spacing:1.5px;}
.rm-desc{font-size:13.5px;color:var(--text2);line-height:1.7;}

/* next-link */
.next-link{display:inline-block;margin:30px 0 0;padding:10px 22px;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  text-decoration:none;border-radius:30px;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:14px;letter-spacing:2px;font-weight:600;
  box-shadow:0 4px 14px rgba(184,134,11,.3);transition:all .25s;}
.next-link:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(184,134,11,.45);}

/* read progress */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:2px;display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* back to top */
#backTop{position:fixed;right:24px;bottom:80px;width:44px;height:44px;
  border-radius:50%;background:var(--accent);color:#fff;border:0;
  font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;

.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;padding:8px 0;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  width:100%;padding:6px 4px;text-decoration:none;color:var(--sbText);
  cursor:pointer;transition:all .3s;border-radius:6px;}
.sb-item:hover{background:rgba(184,134,11,.15);color:var(--goldL);}
.sb-item.active{background:rgba(184,134,11,.22);color:var(--goldL);
  box-shadow:inset 3px 0 0 var(--goldL);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  background:rgba(212,196,168,.12);border:1.5px solid rgba(212,196,168,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:15px;font-weight:700;
  transition:all .3s;}
.sb-item.active .sb-circle{background:var(--gold);border-color:var(--goldL);color:#1e1a14;
  box-shadow:0 0 12px rgba(212,168,75,.6);}
.sb-label{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11.5px;letter-spacing:.5px;
  text-align:center;line-height:1.2;}

/* Hamburger */
#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:200;
  width:44px;height:44px;border:none;border-radius:8px;
  background:var(--sbBg);color:var(--gold);font-size:22px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.2);}

/* ============ Main ============ */
.main{margin-left:var(--sbW);min-height:100vh;}

/* ============ Hero ============ */
.site-hero{
  background:var(--headGrad);
  color:#f5e6c8;padding:64px 32px 56px;text-align:center;
  position:relative;overflow:hidden;
}
.site-hero::before{
  content:&quot;般 若&quot;;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:340px;font-weight:900;color:rgba(212,168,75,.04);
  letter-spacing:48px;pointer-events:none;white-space:nowrap;
}
.hero-content{position:relative;z-index:2;max-width:900px;margin:0 auto;}
.hero-eyebrow{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:8px;
  color:var(--goldL);margin-bottom:18px;opacity:.85;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:6px;
  color:#f5e6c8;margin-bottom:14px;line-height:1.25;}
.hero-subtitle{font-size:20px;color:var(--goldL);letter-spacing:4px;margin-bottom:22px;font-weight:600;}
.hero-sub{font-size:18px;color:#d4c4a8;letter-spacing:2px;margin-bottom:8px;font-weight:400;}
.hero-meta{font-size:18px;color:#bca87f;letter-spacing:2px;margin-top:16px;}
.hero-range{display:inline-block;margin-top:18px;padding:6px 18px;
  border:1px solid rgba(212,168,75,.5);border-radius:20px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:17px;letter-spacing:3px;color:var(--goldL);}

/* ============ Preface ============ */
.preface{
  max-width:900px;margin:50px auto 0;padding:0 32px;
}
.preface-title{
  font-size:30px;color:var(--accent);text-align:center;font-weight:700;
  letter-spacing:4px;margin-bottom:24px;position:relative;padding-bottom:16px;
}
.preface-title::after{
  content:&quot;&quot;;position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:80px;height:3px;background:linear-gradient(90deg,var(--gold),var(--goldL));
  border-radius:2px;
}
.preface p{
  font-size:19px;line-height:2.1;color:var(--text2);
  margin-bottom:14px;text-indent:2em;
}

/* ============ TOC ============ */
.toc-section{
  max-width:1100px;margin:60px auto 30px;padding:0 32px;
}
.toc-title{
  font-size:34px;color:var(--accent);text-align:center;font-weight:700;
  letter-spacing:8px;margin-bottom:14px;
}
.toc-desc{
  text-align:center;color:var(--text-muted);font-size:17px;
  letter-spacing:2px;margin-bottom:36px;
}
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}
.toc-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:18px 22px;display:flex;align-items:center;gap:16px;
  text-decoration:none;color:var(--text);transition:all .3s;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
  cursor:pointer;
}
.toc-card:hover{
  transform:translateY(-2px);
  border-color:var(--gold);box-shadow:0 6px 20px rgba(184,134,11,.15);
}
.toc-num{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;font-weight:700;
  flex-shrink:0;
}
.toc-name{
  font-size:19.5px;font-weight:600;color:var(--text);line-height:1.7;
}

/* ============ Chapter ============ */
.chapter{margin-top:24px;}
.ch-head{
  background:var(--headGrad);color:#f5e6c8;
  padding:48px 32px 42px;text-align:center;position:relative;
}
.ch-head::after{
  content:&quot;&quot;;position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:120px;height:2px;
  background:linear-gradient(90deg,transparent,var(--goldL),transparent);
}
.ch-num{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;color:var(--goldL);
  letter-spacing:6px;margin-bottom:14px;opacity:.85;
}
.ch-name{
  font-size:34px;font-weight:700;letter-spacing:4px;margin-bottom:12px;color:#f5e6c8;
}
.ch-sub{
  font-size:17px;color:#bca87f;letter-spacing:2px;font-weight:400;
}
.ch-body{
  max-width:980px;margin:0 auto;padding:36px 32px 40px;background:var(--card);
}

/* Bridges */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);
  border-left:5px solid var(--gold);
  border-radius:10px;
  padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;
}
.bridge-label{
  display:inline-block;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 8px;color:var(--text2);line-height:2.1;font-size:18.5px;text-indent:2em;}
.bridge p:last-child{margin-bottom:0;}

/* Section h2/h3 */
.ch-body h2{
  font-size:30px;color:var(--accent);font-weight:700;letter-spacing:2px;
  margin:32px 0 14px;padding:10px 0 10px 20px;
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent);
}
.ch-body h2:first-child{margin-top:0;}
.ch-body h3{
  font-size:23.5px;color:var(--accent);font-weight:700;letter-spacing:1px;
  margin:24px 0 10px;padding-bottom:6px;
  border-bottom:1px solid var(--border-light);
}
.ch-body h4{
  font-size:20px;color:var(--text2);font-weight:600;
  margin:18px 0 8px;
}

/* Paragraph */
.ch-body p{
  font-size:20px;line-height:1.9;margin-bottom:12px;color:var(--text);
  text-indent:2em;
}
.ch-body p.no-indent{text-indent:0;}

/* Classical text 經典原文 */
.classical-text{
  background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:18px 24px;margin:18px 0;line-height:2;
  position:relative;
}
.classical-text p{
  font-size:20px;line-height:2;text-indent:2em;color:var(--text);margin-bottom:10px;
}
.classical-text p:last-child{margin-bottom:0;}
.text-label{
  display:inline-block;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13.5px;letter-spacing:2.5px;
  background:var(--accent);color:#fff;
  padding:3px 12px;border-radius:14px;margin-bottom:12px;
  font-weight:500;
}
.classical-text strong{color:var(--accent-red);font-weight:700;}

/* Verse 偈頌 */
.verse,.gatha{
  background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:14px 22px;margin:16px 0;line-height:2.2;
  text-align:center;font-size:22px;color:var(--text);
  border-radius:0 8px 8px 0;
  white-space:normal;
}

/* QA 問答 */
.qa{margin:18px 0;}
.qa .q,.qa .a{font-size:20px;line-height:1.9;padding:12px 18px;border-radius:8px;margin-bottom:8px;}
.qa .q{background:rgba(46,89,140,.06);border-left:4px solid #2e598c;color:#1e3a5c;}
.qa .a{background:rgba(139,46,0,.05);border-left:4px solid var(--accent-red);color:var(--text);}
.qa .q::before{content:&quot;問　&quot;;font-weight:700;color:#2e598c;letter-spacing:2px;}
.qa .a::before{content:&quot;答　&quot;;font-weight:700;color:var(--accent-red);letter-spacing:2px;}

/* Insight cards */
.insight{
  background:var(--card);border:1px solid var(--border);
  border-left:4px solid var(--gold);
  border-radius:8px;padding:18px 24px;margin:18px 0;
  box-shadow:0 2px 8px rgba(91,58,41,.06);
}
.insight-title{font-size:21.5px;color:var(--accent);font-weight:700;
  letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.insight-title::before{content:&quot;◆&quot;;color:var(--gold);font-size:18px;}
.insight-content{font-size:20px;line-height:1.9;color:var(--text);}
.insight-content p{text-indent:2em;margin-bottom:8px;}
.insight-content p:last-child{margin-bottom:0;}
.insight-content strong{color:var(--accent-red);font-weight:700;}

/* Three-grid for the 三事 */
.three-reasons{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;margin:20px 0;
}
.reason-cell{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:18px 20px;position:relative;
  box-shadow:0 2px 8px rgba(91,58,41,.06);
}
.reason-num{
  position:absolute;top:-12px;left:16px;
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;font-weight:700;
}
.reason-title{font-size:18.5px;font-weight:700;color:var(--accent);
  margin:6px 0 8px;letter-spacing:1px;}
.reason-desc{font-size:17.5px;line-height:1.85;color:var(--text2);}

/* Flow chart vertical */
.flow-v{display:flex;flex-direction:column;align-items:center;gap:8px;margin:20px 0;}
.flow-step{
  background:var(--card);border:1.5px solid var(--gold);border-radius:10px;
  padding:12px 24px;font-size:17.5px;color:var(--text);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:500;
  min-width:240px;text-align:center;
  box-shadow:0 2px 6px rgba(91,58,41,.08);
}
.flow-step small{display:block;font-size:14px;color:var(--text-muted);margin-top:4px;font-weight:400;}
.flow-arrow{font-size:22px;color:var(--gold);line-height:1;}

/* Domino chain horizontal */
.domino-chain{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px;margin:20px 0;}
.domino{
  background:linear-gradient(135deg,var(--card),#f3e8c8);
  border:1px solid var(--border);border-radius:8px;
  padding:10px 16px;font-size:16.5px;color:var(--text);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:500;
}
.chain-arrow{color:var(--gold);font-size:18px;font-weight:700;}

/* Next link */
.next-link{
  display:inline-block;margin-top:30px;padding:10px 24px;
  background:var(--gold);color:#fff;text-decoration:none;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:17px;letter-spacing:2px;
  border-radius:24px;transition:all .3s;
  box-shadow:0 3px 10px rgba(184,134,11,.3);
}
.next-link:hover{background:var(--goldL);transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(184,134,11,.4);}

/* Footer */
.site-footer{
  background:var(--sbBg);color:#bca87f;padding:36px 32px;
  text-align:center;margin-top:60px;
}
.site-footer p{font-size:15px;line-height:1.9;color:#bca87f;letter-spacing:1px;margin-bottom:6px;}
.site-footer .footer-title{color:var(--goldL);font-weight:700;font-size:16px;letter-spacing:3px;margin-bottom:12px;}

/* Read progress */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-size:13px;font-weight:600;min-width:40px;text-align:right;}
.read-progress .rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}

/* Back to top */
#backTop{
  position:fixed;right:24px;bottom:80px;z-index:110;
  width:44px;height:44px;border-radius:50%;border:none;
  background:var(--gold);color:#fff;font-size:22px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(184,134,11,.35);
  transition:all .3s;
}
#backTop:hover{background:var(--goldL);transform:translateY(-3px);}
#backTop.show{display:flex;}

/* Responsive */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:48px 18px 36px;}
  .hero-title{font-size:38px;letter-spacing:4px;}
  .hero-subtitle{font-size:17px;}
  .preface{padding:0 18px;}
  .toc-section{padding:0 18px;}
  .toc-grid{grid-template-columns:1fr;}
  .ch-head{padding:36px 18px 30px;}
  .ch-name{font-size:26px;}
  .ch-body{padding:24px 18px 30px;}
  .ch-body h2{font-size:24px;}
  .ch-body h3{font-size:20px;}
  body{font-size:18px;}
  .ch-body p,.classical-text p,.insight-content,.bridge p{font-size:18px;}
  .three-reasons{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .hero-title{font-size:30px;letter-spacing:2px;}
  body{font-size:17px;}
}

.toc-title{font-size:28px;text-align:center;color:var(--accent);font-weight:700;

.toc-desc{text-align:center;color:var(--text2);font-size:14px;
  letter-spacing:3px;margin-bottom:24px;font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.toc-card{display:flex;align-items:center;gap:14px;padding:14px 18px;
  background:#fffdf7;border:1px solid var(--border);border-radius:10px;
  text-decoration:none;color:var(--text);transition:all .25s;cursor:pointer;}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(91,58,41,.12);
  border-color:var(--gold);}
.toc-num{width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;flex-shrink:0;font-family:&quot;Noto Serif TC&quot;,serif;font-size:16px;}
.toc-name{flex:1;font-size:16.5px;line-height:1.5;color:var(--text);font-weight:600;}
.toc-sub{flex:0 0 auto;font-size:12px;color:var(--text-muted);letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;text-align:right;max-width:140px;}

/* Chapter */
.chapter{margin:36px auto;max-width:980px;padding:0 30px;}
.ch-head{background:var(--headGrad);color:#fff;padding:36px 40px 30px;
  border-radius:12px 12px 0 0;text-align:center;position:relative;}
.ch-head::after{content:&quot;&quot;;position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--goldL),transparent);}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;
  letter-spacing:5px;color:rgba(212,168,75,.8);margin-bottom:8px;}
.ch-name{font-size:30px;font-weight:700;color:var(--goldL);
  letter-spacing:6px;margin-bottom:6px;}
.ch-sub{font-size:14px;letter-spacing:3px;color:rgba(255,253,247,.7);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.ch-body{background:var(--card);padding:36px 40px 30px;border:1px solid var(--border);
  border-top:0;border-radius:0 0 12px 12px;}

/* Bridges */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:11px;background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent)}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

/* Headings */
h1{font-size:30px;color:var(--accent);margin:36px 0 14px;font-weight:700;}
h2{font-size:24px;color:var(--accent);margin:32px 0 14px;
  border-left:4px solid var(--gold);padding:10px 0 10px 20px;
  background:linear-gradient(90deg,rgba(212,168,75,.12),transparent);font-weight:700;}
h3{font-size:19px;color:var(--text);margin:24px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--border-light);font-weight:600;}
h4{font-size:17px;color:var(--text2);margin:18px 0 8px;font-weight:600;}
h5{font-size:15.5px;color:var(--gold);margin:12px 0 6px;font-weight:700;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:1.5px;}

p{margin:0 0 12px;line-height:1.85;color:var(--text);}
p strong,p b{color:var(--accent-red);font-weight:700}
.qa-2{padding-left:2em}
.qa-3{padding-left:3em}

.sanskrit{font-family:Georgia,&quot;Noto Serif TC&quot;,serif;font-style:italic;
  color:var(--accent);font-size:.92em;}

/* Verse */
.verse{background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:14px 22px;margin:16px 0;line-height:1.9;
  white-space:normal;text-align:center;font-style:italic;
  font-size:18px;color:var(--text);border-radius:0 8px 8px 0;}

/* Cards */
.card,.commentary,.insight{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:16px 22px;margin:14px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.04);}
.commentary{border-left:3px solid var(--accentL);background:#fffaf0;}
.insight{border-left:3px solid var(--gold);background:linear-gradient(135deg,#fffdf5,#fff8e8);}

.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:18px 24px;line-height:1.9;margin:16px 0;}
.text-label{display:inline-block;background:var(--text);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;letter-spacing:2px;
  padding:2px 10px;border-radius:10px;margin-right:8px;vertical-align:1px;}

/* Two-col / Three-col / Four-grid */
.two-col,.three-col{display:grid;gap:14px;margin:16px 0;}
.two-col{grid-template-columns:1fr 1fr;}
.three-col{grid-template-columns:repeat(3,1fr);}
.col{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:14px 18px;}
.col-title{font-weight:700;color:var(--accent);font-size:16px;
  margin-bottom:8px;letter-spacing:1px;}
.col p{font-size:15.5px;line-height:1.8;color:var(--text);margin:0;}

.four-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;}
.four-grid .cell{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:14px 18px;}
.four-grid .cell .num{display:inline-block;width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  text-align:center;line-height:26px;font-weight:700;font-size:13px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;margin-right:8px;}
.four-grid .cell .term{font-weight:700;color:var(--accent);font-size:16px;}
.four-grid .cell .desc{margin-top:8px;font-size:15.5px;line-height:1.8;color:var(--text2);}

.grid-4{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;}
.grid-4 .cell{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:14px 18px;display:flex;align-items:flex-start;gap:12px;}
.grid-4 .cell .num{flex:0 0 28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  text-align:center;line-height:28px;font-weight:700;font-size:13px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.grid-4 .cell .term{font-weight:700;color:var(--accent);font-size:15.5px;display:block;margin-bottom:4px;}
.grid-4 .cell .desc{font-size:14.5px;line-height:1.75;color:var(--text2);display:block;}

/* Flow */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:10px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:16px 18px;margin:14px 0;}
.flow-box,.flow-step{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-radius:8px;padding:10px 16px;
  font-size:15px;text-align:center;min-width:120px;color:var(--text);font-weight:600;}
.flow-step small,.flow-box small{display:block;font-size:12.5px;
  color:var(--text-muted);font-weight:400;margin-top:4px;}
.flow-arrow{color:var(--gold);font-size:20px;font-weight:700;}
.flow.flow-v{flex-direction:column;align-items:stretch;}
.flow.flow-v .flow-step{min-width:0;text-align:left;padding:12px 18px;}
.flow.flow-v .flow-arrow{align-self:center;}

.domino-chain{display:flex;align-items:center;justify-content:center;
  flex-wrap:wrap;gap:8px;margin:18px 0;padding:16px;
  background:#fffdf5;border:1px solid var(--border);border-radius:10px;}
.domino{background:linear-gradient(135deg,#fff7e0,#f5ecd8);
  border:1px solid var(--border);border-radius:6px;padding:8px 14px;
  font-size:14px;text-align:center;min-width:90px;line-height:1.5;color:var(--text);}
.chain-arrow{color:var(--gold);font-size:18px;font-weight:700;}

/* table */
table strong{color:var(--accent-red);}

/* next-link */
.next-link{display:inline-block;margin-top:18px;padding:10px 20px;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  border-radius:24px;font-size:14px;letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;text-decoration:none;
  box-shadow:0 2px 10px rgba(184,134,11,.3);transition:transform .2s;}
.next-link:hover{transform:translateY(-1px);color:#fff;}

/* Footer */
.site-footer{margin:60px 0 80px;padding:30px;text-align:center;
  color:var(--text-muted);font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:2px;}

/* Responsive */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.show{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:60px 24px 50px;}
  .hero-title{font-size:34px;letter-spacing:4px;}
  .ch-head{padding:26px 22px;}
  .ch-name{font-size:24px;letter-spacing:3px;}
  .ch-body{padding:24px 22px;}
  .two-col,.three-col,.four-grid,.grid-4{grid-template-columns:1fr;}
  .toc-card{padding:12px 14px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  h1{font-size:24px;}
  h2{font-size:20px;}
  h3{font-size:17px;}
}

}
.flow-step small,.flow-box small{display:block;color:var(--text2);font-size:13px;margin-top:4px;}
.flow-arrow{font-size:22px;color:var(--gold);font-weight:700;text-align:center;}
.flow.flow-v .flow-step{text-align:left;}
.flow.flow-v .flow-arrow{margin:0;font-size:18px;}

/* 骨牌 */
.domino-chain{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:6px;margin:16px 0;padding:14px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;
}
.domino{
  background:var(--gold);color:#fff;border-radius:6px;
  padding:8px 14px;font-size:14px;font-weight:600;letter-spacing:.5px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
}
.chain-arrow{color:var(--gold);font-weight:700;font-size:18px;}

/* === 底部進度 === */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
}
.rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.rp-pct{font-weight:600;min-width:38px;text-align:right;}
.rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* === 章間橋接 === */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;
}
.bridge-label{
  display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2px;margin-bottom:10px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

/* === 回頂 === */
#backTop{
  position:fixed;right:24px;bottom:60px;z-index:115;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;cursor:pointer;
  font-size:20px;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2);
}
#backTop.show{display:block;}

/* 頁尾 */
.site-footer{text-align:center;padding:30px 20px 80px;color:var(--text-muted);font-size:13px;letter-spacing:2px;border-top:1px solid var(--border-light);background:var(--card);}
.site-footer p{margin:0 0 6px;}

/* 響應式 */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .ch-body{padding:24px 18px 36px;}
  .hero-title{font-size:32px;letter-spacing:4px;}
  .three-col,.debate,.four-grid,.grid-4{grid-template-columns:1fr;}
  .flow{padding:14px 8px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:26px;}
  .ch-name{font-size:22px;}
}

<script>
/* 側欄高亮（IntersectionObserver-free 版本，避開 iframe 內測）*/
function updateActive(){
  var chapters = document.querySelectorAll('section.chapter');
  var sbItems  = document.querySelectorAll('.sb-item');
  var threshold = window.innerHeight * 0.35;
  var idx = -1;
  chapters.forEach(function(ch, i){
    if(ch.getBoundingClientRect().top < threshold) idx = i;
  });
  sbItems.forEach(function(it, i){ it.classList.toggle('active', i === idx); });
  /* 自動捲動側欄使 active 可見 */
  if(idx >= 0 && sbItems[idx]){
    var sb = document.getElementById('sb');
    var ai = sbItems[idx];
    if(sb && ai){
      var rect = ai.getBoundingClientRect();
      var sbR  = sb.getBoundingClientRect();
      if(rect.top < sbR.top + 60 || rect.bottom > sbR.bottom - 60){
        sb.scrollTo({ top: ai.offsetTop - sbR.height/2, behavior:'smooth' });
      }
    }
  }
}
window.addEventListener('scroll', updateActive, {passive:true});
window.addEventListener('resize', updateActive);
updateActive();

/* 進度膠囊 */
var rpFill = document.getElementById('rpFill');
var rpPct  = document.getElementById('rpPct');
function updateProgress(){
  var sh = document.documentElement.scrollHeight - window.innerHeight;
  var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
  if(rpFill) rpFill.style.width = pct + '%';
  if(rpPct)  rpPct.textContent = Math.round(pct) + '%';
}
window.addEventListener('scroll', updateProgress, {passive:true});
updateProgress();

/* 側欄 sticky 卷名回頂 */
var sbBrand = document.getElementById('sbBrand');
if(sbBrand){
  sbBrand.addEventListener('click', function(e){
    e.preventDefault();
    window.scrollTo({top:0, behavior:'smooth'});
  });
}

/* 漢堡 */
var tog = document.getElementById('sbToggle');
var sb  = document.getElementById('sb');
if(tog && sb){ tog.addEventListener('click', function(){ sb.classList.toggle('open'); }); }

/* 回頂 */
var bt = document.getElementById('backTop');
window.addEventListener('scroll', function(){
  if(bt) bt.style.display = window.scrollY > 600 ? 'block' : 'none';
}, {passive:true});
if(bt) bt.addEventListener('click', function(){ window.scrollTo({top:0, behavior:'smooth'}); });

/* iframe 自動高度 — 只用 body.scrollHeight、無 buffer、解除 min-height */
function resizeFrame(f){
  try{
    var d = f.contentDocument || f.contentWindow.document;
    if(!d || !d.body) return;
    d.body.style.minHeight = '0';
    d.body.style.height    = 'auto';
    if(d.documentElement){
      d.documentElement.style.minHeight = '0';
      d.documentElement.style.height    = 'auto';
    }
    var h = d.body.scrollHeight;
    if(h > 100){
      f.style.height    = h + 'px';
      f.style.minHeight = '0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries = 0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries < 30) setTimeout(tick, 200);
  }
  if(f.contentDocument && f.contentDocument.readyState === 'complete'){
    tick();
  } else {
    f.addEventListener('load', tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize', function(){
  clearTimeout(rzT);
  rzT = setTimeout(resizeAllFrames, 200);
});

/* 錨點點擊防錯跳 */
document.addEventListener('click', function(e){
  var a = e.target;
  while(a && a.tagName !== 'A') a = a.parentElement;
  if(!a) return;
  var h = a.getAttribute('href');
  if(!h || h.charAt(0) !== '#' || h.length < 2) return;
  var id = h.substring(1);
  var el = document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect = el.getBoundingClientRect();
    var y = window.scrollY + rect.top - 20;
    window.scrollTo({top:y, behavior:'smooth'});
  }, 60);
}, true);

/* 前 15 秒持續輪詢 */
var _rt=0, _riv=setInterval(function(){
  _rt++; resizeAllFrames();
  if(_rt > 50) clearInterval(_riv);
}, 300);

/* 防複製（外層）*/
(function(){

    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);

    if(window.getSelection) try{window.getSelection().removeAllRanges();}catch(e){}
  },300);
})();
