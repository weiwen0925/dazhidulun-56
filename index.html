<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>大智度論 · 第五十六卷 · 全五品彙整</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/><style>
:root{--bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
--accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
--gold:#b8860b;--goldL:#d4a84b;--border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
--sbW:96px;--sbBg:#1e1a14;--sbText:#d4c4a8;
--headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);--r:8px;}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
 font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
 -webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none;}
a{color:inherit;text-decoration:none;}
/* 側欄 */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
 color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
 padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-head{position:sticky;top:0;width:100%;background:var(--sbBg);z-index:5;
 padding:14px 6px 10px;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand{display:block;text-align:center;color:var(--gold);cursor:pointer;line-height:1.5;}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .l1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;font-family:"Noto Sans TC",sans-serif;}
.sb-brand .l2{display:block;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--goldL);margin-top:2px;}
.sb-brand .l3{display:block;font-size:10px;opacity:.55;margin-top:3px;font-family:"Noto Sans TC",sans-serif;}
.sb-quick{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:9px;}
.sb-qbtn{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;color:var(--goldL);
 border:1px solid rgba(184,134,11,.5);background:rgba(184,134,11,.12);
 border-radius:11px;padding:2px 12px;letter-spacing:1px;cursor:pointer;transition:background .2s;}
.sb-qbtn:hover{background:rgba(184,134,11,.30);}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:12px;width:100%;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;
 border-radius:8px;width:84%;transition:background .2s;cursor:pointer;}
.sb-item:hover{background:rgba(184,134,11,.12);}
.sb-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
 font-size:16px;font-weight:600;font-family:"Noto Sans TC",sans-serif;
 border:1.5px solid rgba(184,134,11,.55);color:var(--gold);background:rgba(184,134,11,.06);}
.sb-label{font-size:11.5px;font-family:"Noto Sans TC",sans-serif;letter-spacing:.3px;
 color:var(--sbText);opacity:.82;text-align:center;line-height:1.3;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);
 box-shadow:0 0 12px rgba(184,134,11,.6);}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;font-weight:500;}
/* 主區 */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;background:var(--headGrad);color:#fff;text-align:center;
 padding:74px 28px 60px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
 font-size:320px;font-weight:900;color:rgba(212,168,75,.04);white-space:nowrap;pointer-events:none;}
.hero-inner{position:relative;z-index:1;}
.hero-eyebrow{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:8px;
 color:var(--goldL);opacity:.9;margin-bottom:16px;}
.hero-title{font-size:56px;font-weight:900;color:#f5e6c0;letter-spacing:4px;margin:0 0 14px;}
.hero-subtitle{font-size:20px;color:#e7d9b8;letter-spacing:2px;margin-bottom:10px;font-weight:600;}
.hero-meta{font-size:16px;color:#cbbfa3;font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;margin-bottom:8px;}
.hero-range{font-size:15px;color:#b9aa86;font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;
 border-top:1px solid rgba(184,134,11,.3);display:inline-block;padding-top:12px;margin-top:6px;}
/* 前言 */
.preface{max-width:860px;margin:38px auto 6px;padding:0 30px;}
.preface-title{font-size:30px;color:var(--accent);text-align:center;letter-spacing:3px;margin-bottom:18px;font-weight:700;}
.preface-title::after{content:"";display:block;width:60px;height:2px;background:var(--gold);margin:12px auto 0;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-align:justify;}
/* 總目錄 */
.toc-section{max-width:1120px;margin:36px auto 12px;padding:0 28px;}
.toc-title{font-size:34px;color:var(--accent);text-align:center;letter-spacing:8px;font-weight:700;}
.toc-title::after{content:"";display:block;width:60px;height:2px;background:var(--gold);margin:12px auto 0;}
.toc-desc{font-size:17px;color:var(--text-muted);text-align:center;font-family:"Noto Sans TC",sans-serif;margin:10px 0 24px;letter-spacing:1px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.toc-card{display:flex;gap:16px;align-items:flex-start;background:var(--card);
 border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;
 transition:transform .2s,box-shadow .2s,border-color .2s;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(91,58,41,.12);border-color:var(--gold);}
.toc-num{flex:0 0 auto;width:42px;height:42px;border-radius:50%;background:var(--gold);color:#fff;
 display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;font-family:"Noto Sans TC",sans-serif;}
.toc-name{font-size:19.5px;font-weight:700;color:var(--accent);line-height:1.6;margin-bottom:6px;}
.toc-cap{font-size:15px;color:var(--text-muted);line-height:1.65;font-family:"Noto Sans TC",sans-serif;}
/* 章節（品） */
.chapter{margin:30px 0 0;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;padding:40px 28px 34px;position:relative;}
.ch-head::after{content:"";display:block;width:70px;height:2px;background:var(--gold);margin:18px auto 0;}
.ch-num{font-size:18px;color:var(--goldL);font-family:"Noto Sans TC",sans-serif;letter-spacing:3px;margin-bottom:12px;}
.ch-name{font-size:38px;font-weight:900;color:#f5e6c0;letter-spacing:3px;margin:0;}
.ch-sub{font-size:17px;color:#cbbfa3;margin-top:14px;line-height:1.7;max-width:760px;margin-left:auto;margin-right:auto;}
.ch-body{max-width:1000px;margin:0 auto;padding:28px 30px 10px;}
/* 橋接 */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
 border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;
 box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin:30px 0 14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
 background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}
/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);
 border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin:8px 0 4px;font-family:"Noto Sans TC",sans-serif;font-size:17px;
 color:var(--accent);border:1px solid var(--border);border-radius:20px;padding:8px 22px;
 transition:background .2s,border-color .2s;}
.next-link:hover{background:rgba(184,134,11,.1);border-color:var(--gold);}
/* 進度膠囊 */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
 background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
 border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
 font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
 display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);
 transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
#backTop{position:fixed;right:22px;bottom:22px;width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
 background:var(--sbBg);color:var(--goldL);font-size:22px;display:none;z-index:120;box-shadow:0 3px 12px rgba(0,0,0,.3);}
#backTop.show{display:block;}
#sbToggle{display:none;}
.site-footer{background:var(--headGrad);color:#cbbfa3;text-align:center;padding:34px 24px;margin-top:44px;font-size:15px;line-height:1.9;}
.site-footer .ft-title{color:var(--goldL);font-size:18px;letter-spacing:3px;margin-bottom:8px;}
/* RWD */
@media(max-width:900px){
 #sb{transform:translateX(-100%);transition:transform .3s;}
 #sb.open{transform:translateX(0);}
 .main{margin-left:0;}
 #sbToggle{display:flex;position:fixed;left:14px;top:14px;z-index:130;width:42px;height:42px;border-radius:8px;
  border:none;background:var(--sbBg);color:var(--goldL);font-size:20px;align-items:center;justify-content:center;cursor:pointer;}
 .hero-title{font-size:40px;}.site-hero::before{font-size:200px;}
 .ch-name{font-size:30px;}.ch-body,.preface,.toc-section{padding-left:18px;padding-right:18px;}
}

(function(){
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct'),bt=document.getElementById('backTop');
function updateProgress(){var sh=document.documentElement.scrollHeight-window.innerHeight;
 var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
 if(rpFill)rpFill.style.width=pct+'%';if(rpPct)rpPct.textContent=Math.round(pct)+'%';
 if(bt){if(window.scrollY>600)bt.classList.add('show');else bt.classList.remove('show');}}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();
/* iframe 自動高度 */
function resizeFrame(f){try{var d=f.contentDocument||f.contentWindow.document;if(!d||!d.body)return;
 d.body.style.minHeight='0';d.body.style.height='auto';
 if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
 var h=d.body.scrollHeight;if(h>100){f.style.height=h+'px';f.style.minHeight='0';}}catch(e){}}
function resizeAllFrames(){document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);updateProgress();}
function setupFrame(f){var tries=0;function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
 if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}else{f.addEventListener('load',tick);}}
window.setupFrame=setupFrame;window.resizeAllFrames=resizeAllFrames;
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
/* 錨點防錯跳 */
document.addEventListener('click',function(e){var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
 if(!a)return;var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
 var el=document.getElementById(h.substring(1));if(!el)return;e.preventDefault();
 resizeAllFrames();setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
 var y=window.scrollY+rect.top-20;window.scrollTo({top:y,behavior:'smooth'});
 var sb=document.getElementById('sb');if(sb)sb.classList.remove('open');},60);},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);
/* 側欄高亮 */
var items=Array.prototype.slice.call(document.querySelectorAll('.sb-item'));
var secs=items.map(function(it){return document.getElementById(it.getAttribute('href').substring(1));});
function highlight(){var idx=-1;for(var i=0;i<secs.length;i++){if(secs[i]&&secs[i].getBoundingClientRect().top<window.innerHeight*0.35)idx=i;}
 items.forEach(function(it,i){if(i===idx)it.classList.add('active');else it.classList.remove('active');});}
window.addEventListener('scroll',highlight,{passive:true});highlight();
/* 回頂 */
if(bt)bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
var sbBrand=document.getElementById('sbBrand');
if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
var tog=document.getElementById('sbToggle');var sb=document.getElementById('sb');
if(tog&&sb)tog.addEventListener('click',function(){sb.classList.toggle('open');});
/* 進度膠囊近尾淡出 */
var cap=document.getElementById('readProgress');
if(cap){var ft=document.querySelector('.site-footer');
 if(ft&&'IntersectionObserver' in window){var io=new IntersectionObserver(function(es){
  cap.classList.toggle('hide-near-end',es.some(function(x){return x.isIntersecting;}));},
  {rootMargin:'0px 0px -20px 0px',threshold:0.01});io.observe(ft);}}
/* 防複製（外層） */
var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});
document.addEventListener('keydown',function(e){var k=e.key;
 if(e.ctrlKey&&'cCaAsSpPuUxX'.indexOf(k)>=0)blk(e);if(k==='F12')blk(e);
 if(e.ctrlKey&&e.shiftKey&&'IJCK'.indexOf(k)>=0)blk(e);},true);
})();

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-56-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
